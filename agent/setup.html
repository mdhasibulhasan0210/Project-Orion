<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Security handled by Electron contextIsolation + sandbox:false + contextBridge -->
  <title>Orion Agent Setup</title>
  <link rel="stylesheet" href="setup.css" />
</head>
<body>
  <div class="drag-region"></div>
  <div class="container">

    <!-- Logo / Header -->
    <div class="header">
      <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="8"  r="3.5" fill="#00BFFF" opacity="0.9"/>
        <circle cx="20" cy="20" r="2.5" fill="#00BFFF" opacity="0.8"/>
        <circle cx="44" cy="20" r="2.5" fill="#00BFFF" opacity="0.8"/>
        <circle cx="18" cy="34" r="2"   fill="#00BFFF" opacity="0.7"/>
        <circle cx="32" cy="34" r="2"   fill="#00BFFF" opacity="0.7"/>
        <circle cx="46" cy="34" r="2"   fill="#00BFFF" opacity="0.7"/>
        <circle cx="22" cy="50" r="3"   fill="#00BFFF" opacity="0.85"/>
        <circle cx="42" cy="50" r="3"   fill="#00BFFF" opacity="0.85"/>
        <line x1="32" y1="8"  x2="20" y2="20" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="32" y1="8"  x2="44" y2="20" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="20" y1="20" x2="18" y2="34" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="44" y1="20" x2="46" y2="34" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="18" y1="34" x2="32" y2="34" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="32" y1="34" x2="46" y2="34" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="18" y1="34" x2="22" y2="50" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
        <line x1="46" y1="34" x2="42" y2="50" stroke="#00BFFF" stroke-width="1" opacity="0.4"/>
      </svg>
      <h1 class="brand">Orion Agent</h1>
      <p class="subtitle">Connect this PC to your dashboard</p>
    </div>

    <!-- Device Info Bar -->
    <div class="device-info">
      <span class="device-label">DEVICE</span>
      <span class="device-name" id="deviceName">Detecting...</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" autocomplete="on" onsubmit="return false">
      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" id="togglePassword" class="toggle-pass" tabindex="-1">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
              <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
            </svg>
          </button>
        </div>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" id="autoLaunch" checked />
        <span class="checkbox-custom"></span>
        <span>Start Orion Agent with Windows</span>
      </label>

      <div class="error-box" id="errorBox" style="display:none"></div>

      <button type="submit" id="loginBtn" class="btn-primary">
        <span id="btnText">Connect Device</span>
        <svg id="btnSpinner" class="spinner" viewBox="0 0 24 24" fill="none" style="display:none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="10"/>
        </svg>
      </button>
    </form>

    <p class="footer-note">
      Your credentials are stored securely on this device.<br/>
      This PC will appear in your Orion dashboard once connected.
    </p>

  </div>

  <!-- External script (required by CSP — no inline scripts allowed) -->
  <script src="setup.js"></script>
</body>
</html>
